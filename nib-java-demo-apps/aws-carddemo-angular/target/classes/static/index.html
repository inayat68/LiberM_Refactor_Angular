	(function () {
	const params = new URLSearchParams(window.location.search);
	const isNib = params.has('nib');
	//alert("isNib=" + isNib);
	const head = document.head;

	function addCss(href) {
	  const link = document.createElement('link');
	  link.rel = 'stylesheet';
	  link.type = 'text/css';
	  link.href = href;
	  head.appendChild(link);
	}

	if (isNib) {
	  addCss('assets/css/etpbms_stylesheet_nib.css');
	  addCss('assets/css/etpbms_stylesheet_common.css');
	  addCss('assets/css/etpbms_stylesheet_nibext.css');
	} else {
	  addCss('assets/css/etpbms_stylesheet_mainframe.css');
	  addCss('assets/css/etpbms_stylesheet_common.css');
	}
	})();

	function switchStyle(){
		let url = window.location.href;
		let pos = url.indexOf('?');
		if (url.indexOf('?') > -1) {
			url = url.substr(0, pos)
		} else {
			url += '?nib'
		}
		//alert("New URL=" + url);
		window.location.href = url;
	}
	</script>
